version: '3.8'

services:
  # la db de MySQL
  mysql-db:
    image: mysql:8.0
    container_name: franchise-mysql
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: "franchise_db"
    ports:
      - "3307:3306" # XAMPP que usa el 3306

  # API
  franchise-api:
    build: .
    container_name: franchise-api
    depends_on:
      - mysql-db 
    ports:
      - "8080:8080"
    environment:
      # inyectamos las variables de application.properties
      - DB_HOST=mysql-db
      - DB_PORT=3306
      - DB_NAME=franchise_db
      - DB_USER=root
      - DB_PASSWORD=